<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1A1916"/>
      <stop offset="100%" stop-color="#0A0908"/>
    </radialGradient>
    <radialGradient id="amber-glow" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#E8A040"/>
      <stop offset="100%" stop-color="#C07830" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="left-grad" cx="60%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#A8A49C"/>
      <stop offset="100%" stop-color="#706C65"/>
    </radialGradient>
    <radialGradient id="right-grad" cx="35%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#D8D3CC"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="amber-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg-grad)"/>

  <!-- Left diamond — problem space (discovery + definition) -->
  <polygon
    points="168,106 258,256 168,406 78,256"
    fill="url(#left-grad)"
    filter="url(#soft-shadow)"
  />

  <!-- Right diamond — solution space (ideation + delivery) -->
  <polygon
    points="344,106 434,256 344,406 254,256"
    fill="url(#right-grad)"
    filter="url(#soft-shadow)"
  />

  <!-- Ambient amber glow -->
  <circle cx="256" cy="256" r="28" fill="#C8843A" opacity="0.35" filter="url(#amber-bloom)"/>

  <!-- Amber center dot — human insight at the convergence -->
  <circle cx="256" cy="256" r="19" fill="url(#amber-glow)"/>
  <circle cx="256" cy="256" r="19" fill="#C8843A"/>

  <!-- Inner highlight -->
  <circle cx="250" cy="250" r="7" fill="#E8A040" opacity="0.55"/>
</svg>
